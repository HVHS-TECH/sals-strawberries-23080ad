<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sal’s Strawberry Saloon</title>
  <link rel="stylesheet" href="style.css" />

  <!-- firebase start ****************************************-->
  <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <!-- Add Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>

  <!--Your web app's Firebase configuration!-->
  <!-- firebase end ******************************************-->
  <script src="fb_setup.js"></script>
  <script src="fb_io.js"></script>
</head>

<body>
  <div class="container">

    <h1 id="displayName"></h1>
    <h2>Sal’s Strawberry Saloon</h2>
    <h3>(and other fruit products)</h3>


    <button onclick="fb_authenticate()">Login with Google</button>

    <form id="fruitForm">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="favoriteFruit">Favorite Fruit:</label>
      <input type="text" id="favoriteFruit" name="favoriteFruit" required />

      <label for="fruitQuantity">How many servings per week?</label>
      <input type="number" id="fruitQuantity" name="fruitQuantity" required />

      <!-- add more fields here -->
    </form>

    <button onclick="writeForm()">Submit</button>
    <button onclick="generateEmail()">Generate Email</button>
    <div id="marketingEmail"></div>
    
    <p id="statusMessage"></p>
  </div>
</body>

</html>
